spring.application.name=poketienda

#### Default: use H2 in-memory so the app runs without external MySQL ####
spring.datasource.url=jdbc:h2:mem:pokestore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# If you want to use MySQL (e.g., XAMPP), uncomment and update the following:
# spring.datasource.url=jdbc:mysql://localhost:3306/pokestore
# spring.datasource.username=root
# spring.datasource.password=

# Run server on port 8081 to avoid conflicts on 8080
server.port=8081